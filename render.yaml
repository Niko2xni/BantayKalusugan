# Starter Render Blueprint for BantayKalusugan.
#
# This blueprint deploys:
# - backend/app as a Python Web Service
# - frontend/ as a Render Static Site
#
# The database can stay on Neon PostgreSQL. DATABASE_URL is requested during
# blueprint creation because it points outside Render.

services:
  - type: web
    name: bantaykalusugan-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    preDeployCommand: alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: FRONTEND_ORIGINS
        value: https://bantaykalusugan-web.onrender.com

  - type: web
    name: bantaykalusugan-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://bantaykalusugan-api.onrender.com